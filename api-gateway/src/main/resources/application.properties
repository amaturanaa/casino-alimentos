server.port=8080
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG

# Rutas de cada microservicio
#MS-USUARIOS
spring.cloud.gateway.server.webflux.routes[0].id=ms-usuarios
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ms-usuarios
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/usuarios/**

#MS-SUCURSALES
spring.cloud.gateway.server.webflux.routes[1].id=ms-sucursales
